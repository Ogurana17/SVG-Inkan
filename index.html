<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>SVG Inkan Generator</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    @font-face {
      font-family: "Yuji Syuku";
      src: url("fonts/YujiSyuku-Regular.ttf") format("truetype");
      font-display: swap;
    }
    body {
      font-family: "Yuji Syuku", "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
      text-align: center;
      background: #f8f9fa;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding-left: 1rem;
      padding-right: 1rem;
    }

    .card {
      margin-bottom: 1.5rem;
    }

    .svg-container-group {
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      margin-top: 2rem;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
    }

    .svg-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 50%;
      padding: 0 10px;
      box-sizing: border-box;
    }

    .svg-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      margin-bottom: 1rem;
    }

    svg {
      border: 1px solid #ccc;
      background: #fff;
      width: 100%;
      height: auto;
      max-width: 320px;
      max-height: 320px;
      box-sizing: border-box;
      display: block;
    }

    .inkan-label {
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .download-buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
        width: 100%;
        max-width: 320px;
    }

    @media (max-width: 600px) {
      .container {
        max-width: 100vw;
        padding-left: 0.5rem;
        padding-right: 0.5rem;
      }

      .svg-container-group {
        flex-direction: column;
        margin-top: 1rem;
        padding-left: 0;
        padding-right: 0;
      }

      .svg-wrapper {
        width: 100%;
        padding: 5px 0;
      }

      svg {
        max-width: 100vw;
        max-height: 60vw;
        min-width: 0;
      }
    }
  </style>
</head>

<body>
  <div class="container py-4">
    <h2 class="mb-4">SVG Inkan Generator</h2>
    <div class="card shadow-sm mx-auto">
      <div class="card-body">
        <form onsubmit="event.preventDefault(); onUpdateButton();">
          <div class="mb-3 text-start">
            <label class="inkan-label form-label">部署名</label>
            <input type="text" id="deptInput" class="form-control" value="経理課" />
          </div>
          <div class="mb-3 text-start">
            <label class="inkan-label form-label">氏名</label>
            <input type="text" id="nameInput" class="form-control" value="田中" />
          </div>
          <div class="mb-3 text-start">
            <label class="inkan-label form-label">作成日</label>
            <div id="currentDate" class="form-control-plaintext ps-2"></div>
          </div>
          <div class="d-flex justify-content-center">
            <button type="button" class="btn btn-danger w-50" onclick="onUpdateButton()">印鑑更新</button>
          </div>
          <hr style="margin:1rem 0 0.75rem; border-color:#dee2e6;">
          <div class="text-start">
            <label class="inkan-label form-label mb-1" style="font-size:0.85rem;">ダウンロードサイズ</label>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <input type="number" id="sizeValue" class="form-control form-control-sm" value="15" min="1" step="1" style="width:5.5rem;">
              <select id="sizeUnit" class="form-select form-select-sm" style="width:5rem;" onchange="onUnitChange()">
                <option value="mm" selected>mm</option>
                <option value="px">px</option>
              </select>
              <span id="dpiGroup" class="d-flex align-items-center gap-1">
                <input type="number" id="dpiValue" class="form-control form-control-sm" value="72" min="1" step="1" style="width:5rem;">
                <span class="text-muted" style="font-size:0.8rem; white-space:nowrap;">dpi</span>
              </span>
              <span id="sizePreview" class="text-muted" style="font-size:0.75rem; white-space:nowrap;"></span>
            </div>
            <div id="dpiHint" class="text-muted mt-1" style="font-size:0.7rem;">例）Excel: 96dpi ／ 印刷: 300〜350dpi</div>
          </div>
          <div class="text-start mt-2">
            <label class="inkan-label form-label mb-1" style="font-size:0.85rem;">フォントレンダリング</label>
            <div class="d-flex align-items-center gap-2">
              <select id="emfRenderMode" class="form-select form-select-sm" style="width:auto;" onchange="onUpdateButton()">
                <option value="outline" selected>アウトライン（フォント不要）</option>
                <option value="font">フォント参照（要インストール）</option>
              </select>
            </div>
            <div class="text-muted mt-1" style="font-size:0.7rem;">
              フォント参照モードは高品質ですが、表示側に<a href="https://fonts.google.com/specimen/Yuji+Syuku" target="_blank" rel="noopener">Yuji Syuku</a>のインストールが必要です。<br>
              Google Fonts → Download family → ZIPを展開 → .ttfをダブルクリックでインストール
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="svg-container-group">

      <div class="svg-wrapper">
        <div class="svg-container">
          <svg id="InkanSanmon" width="300" height="300" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <circle cx="30" cy="30" r="28" fill="none" stroke="#EF454A" stroke-width="2.1" />
            <line x1="3" y1="22" x2="57" y2="22" stroke="#EF454A" stroke-width="1.05" />
            <line x1="3" y1="38" x2="57" y2="38" stroke="#EF454A" stroke-width="1.05" />
            <text id="deptText" x="30" y="18" font-size="5.6" fill="#EF454A" text-anchor="middle"
              font-family="Yuji Syuku, Noto Serif JP, Hiragino Mincho ProN, Yu Mincho, serif" font-weight="700"></text>
            <text id="dateText" x="30" y="32" font-size="7.2" fill="#EF454A" text-anchor="middle"
              font-family="Yuji Syuku, Noto Serif JP, Hiragino Mincho ProN, Yu Mincho, serif" font-weight="700"></text>
            <text id="nameText" x="30" y="48" font-size="9.6" fill="#EF454A" text-anchor="middle"
              font-family="Yuji Syuku, Noto Serif JP, Hiragino Mincho ProN, Yu Mincho, serif" font-weight="700"></text>
          </svg>
        </div>
        <div class="download-buttons">
          <button type="button" class="btn btn-outline-secondary" onclick="downloadSVG('InkanSanmon', '三文判')">SVG</button>
          <button type="button" class="btn btn-outline-secondary" onclick="downloadPNG('InkanSanmon', '三文判')">PNG</button>
          <button type="button" class="btn btn-outline-secondary" onclick="downloadEMF('InkanSanmon', '三文判')">EMF</button>
          <button type="button" class="btn btn-outline-secondary" onclick="downloadPDF('InkanSanmon', '三文判')">PDF</button>
        </div>
      </div>

      <div class="svg-wrapper">
        <div class="svg-container">
          <svg id="InkanTateName" width="300" height="300" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <circle cx="30" cy="30" r="28" fill="none" stroke="#EF454A" stroke-width="2.1" />
            <text id="tateNameText" x="30" y="30" font-size="12" fill="#EF454A" text-anchor="middle"
              font-family="Yuji Syuku, Noto Serif JP, Hiragino Mincho ProN, Yu Mincho, serif" font-weight="700"></text>
          </svg>
        </div>
        <div class="download-buttons">
          <button type="button" class="btn btn-outline-secondary" onclick="downloadSVG('InkanTateName', '縦文字')">SVG</button>
          <button type="button" class="btn btn-outline-secondary" onclick="downloadPNG('InkanTateName', '縦文字')">PNG</button>
          <button type="button" class="btn btn-outline-secondary" onclick="downloadEMF('InkanTateName', '縦文字')">EMF</button>
          <button type="button" class="btn btn-outline-secondary" onclick="downloadPDF('InkanTateName', '縦文字')">PDF</button>
        </div>
      </div>
    </div>
  </div>

  <footer style="text-align:center; padding:2rem 0 1rem; color:#adb5bd; font-size:0.75rem; letter-spacing:0.05em;">
    © 2026 ogurana17
  </footer>

  <script src="opentype.js/opentype.min.js"></script>

  <script>
    let loadedFont = null;
    const FONT_URL = 'fonts/YujiSyuku-Regular.ttf';

    // ── ユーティリティ ──────────────────────────────────────────
    function padZero(n) { return String(n).padStart(2, "0"); }
    function getCurrentDateFormatted() {
      const d = new Date();
      return `${d.getFullYear()}.${padZero(d.getMonth()+1)}.${padZero(d.getDate())}`;
    }
    function randomizeColor(hex) {
      const b = [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
      const r = b.map(v => Math.max(0, Math.min(255, v + Math.floor(Math.random()*37)-18)));
      return `rgb(${r[0]},${r[1]},${r[2]})`;
    }
    function randomizeStroke(base) {
      const ratio = 1 + (Math.random()*0.4 - 0.2);
      return base < 0.1 ? (base*(1+(1-ratio)*5)).toFixed(3) : (base*ratio).toFixed(3);
    }

    // ── フォント読み込み ─────────────────────────────────────────
    async function loadFont() {
      const res = await fetch(FONT_URL);
      if (!res.ok) throw new Error(`Font load failed: HTTP ${res.status}`);
      loadedFont = opentype.parse(await res.arrayBuffer());
    }

    // ── パス生成 ─────────────────────────────────────────────────
    // charSpacing: 文字間追加ピクセル（負も可）
    // scaleX: X方向スケール（1.0=通常, >1.0=横長）。中心はbbox中央
    // 戻り値: opentype.Path。NaNが含まれる場合は除去済み
    function buildPath(font, text, x, y, fontSize, isVertical, charSpacing, scaleX) {
      scaleX = scaleX || 1.0;
      const fontScale = fontSize / font.unitsPerEm;
      const chars = text.split('');
      let curX = x, curY = y;

      const path = new opentype.Path();

      chars.forEach((ch, i) => {
        const glyph = font.charToGlyph(ch);
        if (!isVertical && i > 0) {
          const kern = font.getKerningValue(font.charToGlyph(chars[i-1]), glyph) * fontScale;
          if (isFinite(kern)) curX += kern;
        }
        const gp = glyph.getPath(curX, curY, fontSize);
        gp.commands.forEach(cmd => {
          const nums = [cmd.x, cmd.y, cmd.x1, cmd.y1, cmd.x2, cmd.y2].filter(v => v !== undefined);
          if (nums.every(v => isFinite(v))) {
            path.commands.push(cmd);
          }
        });
        const adv = glyph.advanceWidth * fontScale;
        if (isVertical) {
          curY += (isFinite(adv) ? adv : fontSize) + charSpacing;
        } else {
          curX += (isFinite(adv) ? adv : fontSize) + charSpacing;
        }
      });

      // scaleX適用: パス全体のX座標を中心基準でスケーリング
      if (scaleX !== 1.0 && path.commands.length > 0) {
        // まずbbox中心を求める
        const bb = path.getBoundingBox();
        if (isFinite(bb.x1) && isFinite(bb.x2)) {
          const cx = (bb.x1 + bb.x2) / 2;
          path.commands.forEach(cmd => {
            if (cmd.x  !== undefined && isFinite(cmd.x))  cmd.x  = cx + (cmd.x  - cx) * scaleX;
            if (cmd.x1 !== undefined && isFinite(cmd.x1)) cmd.x1 = cx + (cmd.x1 - cx) * scaleX;
            if (cmd.x2 !== undefined && isFinite(cmd.x2)) cmd.x2 = cx + (cmd.x2 - cx) * scaleX;
          });
        }
      }

      return path;
    }

    // パスのbboxを取得（NaNが含まれる場合はnullを返す）
    function safeBbox(path) {
      const bb = path.getBoundingBox();
      if (!isFinite(bb.x1) || !isFinite(bb.y1) || !isFinite(bb.x2) || !isFinite(bb.y2)) return null;
      if (bb.x1 > bb.x2 || bb.y1 > bb.y2) return null;
      return bb;
    }

    // ── テキストをSVGに配置（枠ギリギリ・文字間詰め） ──────────
    function placeFitText(font, text, zone, id, svgElem, color, strokeWidth, isVertical) {
      const old = document.getElementById(id + "Path");
      if (old) old.remove();
      if (!text) return;

      const zW  = zone.xMax - zone.xMin;
      const zH  = zone.yMax - zone.yMin;
      const zCx = (zone.xMin + zone.xMax) / 2;
      const zCy = (zone.yMin + zone.yMax) / 2;
      const CIRCLE_CX = 30, CIRCLE_CY = 30, CIRCLE_R = 28 - 0.8;

      // パスを生成してbboxを返す。ゾーン・円のはみ出しがあればnull
      // scaleX: 縦書き時のX方向スケール（横長化）
      function tryLayout(fontSize, charSpacing, scaleX) {
        scaleX = scaleX || 1.0;
        if (!isFinite(fontSize) || !isFinite(charSpacing)) return null;
        let path, bbox;

        if (!isVertical) {
          const fontScale = fontSize / font.unitsPerEm;
          let totalAdv = 0;
          const chars = text.split('');
          chars.forEach((ch, i) => {
            const g = font.charToGlyph(ch);
            if (i > 0) {
              const k = font.getKerningValue(font.charToGlyph(chars[i-1]), g) * fontScale;
              if (isFinite(k)) totalAdv += k;
            }
            const adv = g.advanceWidth * fontScale;
            totalAdv += (isFinite(adv) ? adv : fontSize);
            if (i < chars.length - 1) totalAdv += charSpacing;
          });
          const xStart = zCx - totalAdv / 2;
          const baseline0 = zCy + fontSize * 0.3;
          const p0   = buildPath(font, text, xStart, baseline0, fontSize, false, charSpacing, 1.0);
          const bb0  = safeBbox(p0);
          if (!bb0) return null;
          const yAdj = zCy - (bb0.y1 + bb0.y2) / 2;
          path = buildPath(font, text, xStart, baseline0 + yAdj, fontSize, false, charSpacing, 1.0);
          bbox = safeBbox(path);
        } else {
          // 縦書き: scaleX で横幅を拡大
          const p0  = buildPath(font, text, zCx, zCy, fontSize, true, charSpacing, scaleX);
          const bb0 = safeBbox(p0);
          if (!bb0) return null;
          const xAdj = zCx - (bb0.x1 + bb0.x2) / 2;
          const yAdj = zCy - (bb0.y1 + bb0.y2) / 2;
          path = buildPath(font, text, zCx + xAdj, zCy + yAdj, fontSize, true, charSpacing, scaleX);
          bbox = safeBbox(path);
        }

        if (!bbox) return null;
        if (bbox.x1 < zone.xMin - 0.05 || bbox.x2 > zone.xMax + 0.05) return null;
        if (bbox.y1 < zone.yMin - 0.05 || bbox.y2 > zone.yMax + 0.05) return null;
        // 円内チェック（4隅＋上下中央の6点で判定、横長化に対応）
        const checkPts = [
          [bbox.x1,bbox.y1],[bbox.x2,bbox.y1],
          [bbox.x1,bbox.y2],[bbox.x2,bbox.y2],
          [bbox.x1,(bbox.y1+bbox.y2)/2],[bbox.x2,(bbox.y1+bbox.y2)/2],
        ];
        for (const [px,py] of checkPts) {
          if ((px-CIRCLE_CX)**2 + (py-CIRCLE_CY)**2 > CIRCLE_R**2 + 0.05) return null;
        }
        return { path, bbox };
      }

      // Step1: 文字間0で最大フォントサイズを二分探索
      let lo = 0.5, hi = isVertical ? 50 : 30, bestFs = lo;
      for (let iter = 0; iter < 35; iter++) {
        const mid = (lo + hi) / 2;
        if (tryLayout(mid, 0)) { bestFs = mid; lo = mid; }
        else hi = mid;
      }

      // Step2: フォントサイズ固定で正の文字間隔を最大化
      let bestSpacing = 0;
      if (text.length > 1) {
        const maxSp = isVertical ? zH / text.length : zW / text.length;
        let spLo = 0, spHi = maxSp;
        for (let iter = 0; iter < 25; iter++) {
          const mid = (spLo + spHi) / 2;
          if (tryLayout(bestFs, mid)) { bestSpacing = mid; spLo = mid; }
          else spHi = mid;
        }
      }

      // Step3: 負の文字間でより大きなフォントサイズが取れるか試す
      let bestNegFs = bestFs, bestNegSp = 0;
      if (text.length > 1) {
        let lo2 = bestFs, hi2 = isVertical ? 50 : 30;
        for (let iter = 0; iter < 25; iter++) {
          const midFs = (lo2 + hi2) / 2;
          let found = false;
          // 負の間隔を -5%～-20% の範囲で試す
          for (let pct = 0.05; pct <= 0.20; pct += 0.05) {
            const sp = -midFs * pct;
            if (tryLayout(midFs, sp)) { bestNegFs = midFs; bestNegSp = sp; found = true; break; }
          }
          if (found) lo2 = midFs; else hi2 = midFs;
        }
      }

      // より大きいほうを採用
      let finalFs, finalSp;
      if (bestNegFs > bestFs + 0.2) {
        finalFs = bestNegFs; finalSp = bestNegSp;
      } else {
        finalFs = bestFs; finalSp = bestSpacing;
      }

      const result = tryLayout(finalFs, finalSp);
      if (!result) return;

      // toPathData()を使わずNaN除去済みcommandsから直接d文字列を生成
      // （toPathData()はQコマンドにNaNが含まれるとSVGが壊れるため）
      function commandsToD(cmds) {
        const f = v => v.toFixed(3);
        return cmds.map(c => {
          if (c.type==='M') return `M${f(c.x)} ${f(c.y)}`;
          if (c.type==='L') return `L${f(c.x)} ${f(c.y)}`;
          if (c.type==='C') return `C${f(c.x1)} ${f(c.y1)} ${f(c.x2)} ${f(c.y2)} ${f(c.x)} ${f(c.y)}`;
          if (c.type==='Q') return `Q${f(c.x1)} ${f(c.y1)} ${f(c.x)} ${f(c.y)}`;
          if (c.type==='Z') return 'Z';
          return '';
        }).join('');
      }
      const svgPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
      svgPath.setAttribute("id", id + "Path");
      svgPath.setAttribute("d", commandsToD(result.path.commands));
      svgPath.setAttribute("fill", color);
      svgPath.setAttribute("stroke", color);
      svgPath.setAttribute("stroke-width", strokeWidth);
      svgElem.appendChild(svgPath);

      const textElem = document.getElementById(id + "Text");
      if (textElem) textElem.remove();
    }

    // ── 縦書き印鑑（グリッド対応版 v2）──────────────────────────
    // 1〜3文字: 縦1列、横引き伸ばし(scaleX)で円横幅いっぱい
    // 4文字以上: rows×cols グリッド（rows≧cols）
    //   読み順: 右列→左列、各列上→下（縦書き日本語の標準）
    //   端数列: グリッド全体のセル高さ基準で縦方向中央寄せ
    //   全文字: scaleXで横幅をギリギリまで使う
    function placeTateStamp(font, text, svgElem, color, strokeWidth) {
      if (!text) return;
      const CX = 30, CY = 30, R = 28 - 0.8;
      const n = text.length;

      // ── グリッドサイズ決定 ──
      let rows, cols;
      if (n <= 3) {
        rows = n; cols = 1;
      } else {
        cols = Math.round(Math.sqrt(n));
        rows = Math.ceil(n / cols);
        if (rows < cols) { const t = rows; rows = cols; cols = t; }
      }

      // ── 各列の文字リストを作成 ──
      // columns[0]=右端列, columns[cols-1]=左端列
      const columns = [];
      let idx = 0;
      for (let c = 0; c < cols; c++) {
        const col = [];
        for (let r = 0; r < rows && idx < n; r++) {
          col.push(text[idx++]);
        }
        columns.push(col);
      }

      // ── tryGridLayout: fontSize, scaleX, gap(文字間の余白) で配置を試行 ──
      // 各文字の実測bboxからセルサイズを決定し、gap分だけ隙間を設ける
      function tryGridLayout(fontSize, scaleX, gap) {
        if (gap === undefined) gap = 0;

        // Step A: 全文字の実測bboxサイズを取得
        const glyphInfos = []; // {ch, w, h} 実測幅/高さ
        for (let i = 0; i < n; i++) {
          const ch = text[i];
          const p = buildPath(font, ch, 0, fontSize * 0.35, fontSize, false, 0, scaleX);
          const bb = safeBbox(p);
          if (!bb) return null;
          glyphInfos.push({ ch, w: bb.x2 - bb.x1, h: bb.y2 - bb.y1 });
        }

        // Step B: 列ごとの最大幅と、全体の最大高さを計算
        let idx2 = 0;
        const colMaxW = []; // 各列の最大文字幅
        const colCharsH = []; // 各列の文字高さ配列
        for (let ci = 0; ci < cols; ci++) {
          let maxW = 0;
          const hs = [];
          for (let ri = 0; ri < rows && idx2 < n; ri++) {
            maxW = Math.max(maxW, glyphInfos[idx2].w);
            hs.push(glyphInfos[idx2].h);
            idx2++;
          }
          colMaxW.push(maxW);
          colCharsH.push(hs);
        }

        // 行の最大高さ（各行位置にある文字の最大高さ）
        const rowMaxH = [];
        for (let ri = 0; ri < rows; ri++) {
          let maxH = 0;
          let gi = 0;
          for (let ci = 0; ci < cols; ci++) {
            const base = ci * rows;
            if (base + ri < n) maxH = Math.max(maxH, glyphInfos[base + ri].h);
          }
          rowMaxH.push(maxH);
        }

        // Step C: グリッド全体サイズ
        const totalW = colMaxW.reduce((a, b) => a + b, 0) + gap * (cols - 1);
        const totalH = rowMaxH.reduce((a, b) => a + b, 0) + gap * (rows - 1);

        // 粗いチェック
        if (totalW / 2 > R || totalH / 2 > R) return null;

        // Step D: 各文字をグリッド内に配置
        // 列X位置: 右端列(ci=0)が右側
        const colCenters = []; // 各列のX中心
        {
          // 列左端の累積位置
          let xCur = CX + totalW / 2; // 右端
          for (let ci = 0; ci < cols; ci++) {
            xCur -= colMaxW[ci] / 2;
            colCenters.push(xCur);
            xCur -= colMaxW[ci] / 2 + gap;
          }
        }

        // 行Y位置: 全体の上端から累積
        const rowCenters = [];
        {
          let yCur = CY - totalH / 2;
          for (let ri = 0; ri < rows; ri++) {
            yCur += rowMaxH[ri] / 2;
            rowCenters.push(yCur);
            yCur += rowMaxH[ri] / 2 + gap;
          }
        }

        const allPaths = [];
        let allBB = { x1: Infinity, y1: Infinity, x2: -Infinity, y2: -Infinity };

        for (let ci = 0; ci < columns.length; ci++) {
          const colChars = columns[ci];
          const colCount = colChars.length;

          // 端数列の中央寄せ: この列の実際の文字高さ合計
          const colH = colCharsH[ci].reduce((a, b) => a + b, 0) + gap * (colCount - 1);
          const yOffset = (totalH - colH) / 2; // 中央寄せオフセット

          // この列の行Y位置を再計算（中央寄せ）
          const colRowCenters = [];
          {
            let yCur = CY - totalH / 2 + yOffset;
            for (let ri = 0; ri < colCount; ri++) {
              yCur += colCharsH[ci][ri] / 2;
              colRowCenters.push(yCur);
              yCur += colCharsH[ci][ri] / 2 + gap;
            }
          }

          for (let ri = 0; ri < colCount; ri++) {
            const ch = colChars[ri];
            const cellCX = colCenters[ci];
            const cellCY = colRowCenters[ri];

            const p0 = buildPath(font, ch, cellCX, cellCY + fontSize * 0.35, fontSize, false, 0, scaleX);
            const bb0 = safeBbox(p0);
            if (!bb0) return null;
            const xAdj = cellCX - (bb0.x1 + bb0.x2) / 2;
            const yAdj = cellCY - (bb0.y1 + bb0.y2) / 2;
            const p1 = buildPath(font, ch, cellCX + xAdj, cellCY + fontSize * 0.35 + yAdj, fontSize, false, 0, scaleX);
            const bb1 = safeBbox(p1);
            if (!bb1) return null;

            allPaths.push(p1);
            allBB.x1 = Math.min(allBB.x1, bb1.x1);
            allBB.y1 = Math.min(allBB.y1, bb1.y1);
            allBB.x2 = Math.max(allBB.x2, bb1.x2);
            allBB.y2 = Math.max(allBB.y2, bb1.y2);
          }
        }

        // 円内チェック（外周＋中間点 計12点）
        const bx1 = allBB.x1, by1 = allBB.y1, bx2 = allBB.x2, by2 = allBB.y2;
        const mx = (bx1 + bx2) / 2, my = (by1 + by2) / 2;
        const checkPts = [
          [bx1,by1],[bx2,by1],[bx1,by2],[bx2,by2],
          [bx1,my],[bx2,my],[mx,by1],[mx,by2],
          [bx1,(by1+my)/2],[bx1,(by2+my)/2],
          [bx2,(by1+my)/2],[bx2,(by2+my)/2],
        ];
        for (const [px, py] of checkPts) {
          if ((px - CX)**2 + (py - CY)**2 > R*R + 0.05) return null;
        }
        return { paths: allPaths, bbox: allBB };
      }

      // ── 最適化探索（gap=0 で文字間をギリギリに詰める）──
      const GAP = 0.3; // 最小余白（文字同士が重ならない程度）

      // Step1: scaleX=1.0 で最大 fontSize
      let lo = 0.5, hi = 50, bestFs = lo;
      for (let it = 0; it < 35; it++) {
        const mid = (lo + hi) / 2;
        if (tryGridLayout(mid, 1.0, GAP)) { bestFs = mid; lo = mid; } else hi = mid;
      }

      // Step2: fontSize固定で最大 scaleX
      const maxSX = cols === 1 ? 3.5 : 2.5;
      let bestSX = 1.0;
      {
        let sLo = 1.0, sHi = maxSX;
        for (let it = 0; it < 30; it++) {
          const mid = (sLo + sHi) / 2;
          if (tryGridLayout(bestFs, mid, GAP)) { bestSX = mid; sLo = mid; } else sHi = mid;
        }
      }

      // Step3: scaleX固定で fontSize 再探索
      {
        let lo2 = bestFs * 0.5, hi2 = 50;
        for (let it = 0; it < 30; it++) {
          const mid = (lo2 + hi2) / 2;
          if (tryGridLayout(mid, bestSX, GAP)) { bestFs = mid; lo2 = mid; } else hi2 = mid;
        }
      }

      // Step4: fontSize と scaleX を交互に最適化（数ラウンド）
      for (let round = 0; round < 3; round++) {
        {
          let sLo = 1.0, sHi = maxSX;
          for (let it = 0; it < 20; it++) {
            const mid = (sLo + sHi) / 2;
            if (tryGridLayout(bestFs, mid, GAP)) { bestSX = mid; sLo = mid; } else sHi = mid;
          }
        }
        {
          let lo2 = bestFs * 0.8, hi2 = 50;
          for (let it = 0; it < 20; it++) {
            const mid = (lo2 + hi2) / 2;
            if (tryGridLayout(mid, bestSX, GAP)) { bestFs = mid; lo2 = mid; } else hi2 = mid;
          }
        }
      }

      const result = tryGridLayout(bestFs, bestSX, GAP);
      if (!result) return;

      // ── SVG出力 ──
      function commandsToD(cmds) {
        const f = v => v.toFixed(3);
        return cmds.map(c => {
          if (c.type==='M') return `M${f(c.x)} ${f(c.y)}`;
          if (c.type==='L') return `L${f(c.x)} ${f(c.y)}`;
          if (c.type==='C') return `C${f(c.x1)} ${f(c.y1)} ${f(c.x2)} ${f(c.y2)} ${f(c.x)} ${f(c.y)}`;
          if (c.type==='Q') return `Q${f(c.x1)} ${f(c.y1)} ${f(c.x)} ${f(c.y)}`;
          if (c.type==='Z') return 'Z';
          return '';
        }).join('');
      }
      let allD = '';
      result.paths.forEach(p => { allD += commandsToD(p.commands); });

      const svgPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
      svgPath.setAttribute("id", "tateNamePath");
      svgPath.setAttribute("d", allD);
      svgPath.setAttribute("fill", color);
      svgPath.setAttribute("stroke", color);
      svgPath.setAttribute("stroke-width", strokeWidth);
      svgElem.appendChild(svgPath);
    }

    // ── 印鑑更新 ─────────────────────────────────────────────────
    function updateStamp() {
      if (!loadedFont) return;

      const date  = getCurrentDateFormatted();
      const dept  = document.getElementById("deptInput").value;
      const name  = document.getElementById("nameInput").value;
      const color = randomizeColor("#EF454A");
      const swOuter = randomizeStroke(2.1);
      const swLine  = randomizeStroke(1.05);
      const swText  = randomizeStroke(0.05);
      const mode = document.getElementById("emfRenderMode").value; // "outline" or "font"

      // ── 三文判 ──
      const svgS = document.getElementById("InkanSanmon");
      svgS.querySelector("circle").setAttribute("stroke", color);
      svgS.querySelector("circle").setAttribute("stroke-width", swOuter);
      const lines = svgS.querySelectorAll("line");
      if (lines[0]) { lines[0].setAttribute("stroke", color); lines[0].setAttribute("stroke-width", swLine); }
      if (lines[1]) { lines[1].setAttribute("stroke", color); lines[1].setAttribute("stroke-width", swLine); }
      // 旧テキスト要素を削除（path/text両方）
      ["dept","date","name"].forEach(id => {
        const p = document.getElementById(id+"Path"); if(p) p.remove();
        const t = document.getElementById(id+"Text"); if(t) t.remove();
      });

      const R = 28 - 0.8;
      function chordHW(bandCY) {
        return Math.sqrt(Math.max(0, R*R - (bandCY - 30)**2)) * 0.97;
      }

      if (mode === "outline") {
        try {
          placeFitText(loadedFont, dept, {xMin:30-chordHW(12.5), xMax:30+chordHW(12.5), yMin:3.5,  yMax:21.5}, "dept",  svgS, color, swText, false);
          placeFitText(loadedFont, date, {xMin:30-chordHW(30),   xMax:30+chordHW(30),   yMin:22.5, yMax:37.5}, "date",  svgS, color, swText, false);
          placeFitText(loadedFont, name, {xMin:30-chordHW(47.5), xMax:30+chordHW(47.5), yMin:38.5, yMax:56.5}, "name",  svgS, color, swText, false);
        } catch(e) { console.error("三文判エラー:", e); }
      } else {
        // フォント参照モード: SVG <text> で描画
        const zones = [
          { id:"dept", text:dept, cy:12.5, yMin:3.5,  yMax:21.5, hR:0.5, wR:1.2 },
          { id:"date", text:date, cy:30,   yMin:22.5, yMax:37.5, hR:0.85, wR:1.8 },
          { id:"name", text:name, cy:47.5, yMin:38.5, yMax:56.5, hR:0.6, wR:1.4 },
        ];
        zones.forEach(z => {
          if (!z.text) return;
          const zH = z.yMax - z.yMin;
          const zW = chordHW(z.cy) * 2;
          const fs = Math.min(zH * z.hR, zW / z.text.length * z.wR);
          const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
          t.setAttribute("id", z.id + "Text");
          t.setAttribute("x", "30");
          t.setAttribute("y", String(z.cy + fs * 0.35));
          t.setAttribute("text-anchor", "middle");
          t.setAttribute("font-family", "Yuji Syuku, serif");
          t.setAttribute("font-size", String(fs));
          t.setAttribute("fill", color);
          t.textContent = z.text;
          svgS.appendChild(t);
        });
      }

      // ── 縦書き印 ──
      const svgT = document.getElementById("InkanTateName");
      if (svgT) {
        svgT.querySelector("circle").setAttribute("stroke", color);
        svgT.querySelector("circle").setAttribute("stroke-width", randomizeStroke(2.1));
        // 旧テキスト要素を削除
        svgT.querySelectorAll("[id^='tateName']").forEach(el => {
          if (el.tagName === "path" || el.tagName === "text") el.remove();
        });
        if (mode === "outline") {
          try {
            placeTateStamp(loadedFont, name, svgT, color, randomizeStroke(0.07));
          } catch(e) { console.error("縦書きエラー:", e); }
        } else {
          // フォント参照: 縦書き <text>
          if (name) {
            const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t.setAttribute("id", "tateNameText");
            t.setAttribute("x", "30");
            t.setAttribute("y", "30");
            t.setAttribute("text-anchor", "middle");
            t.setAttribute("dominant-baseline", "central");
            t.setAttribute("font-family", "Yuji Syuku, serif");
            t.setAttribute("fill", color);
            t.setAttribute("writing-mode", "tb");
            t.setAttribute("glyph-orientation-vertical", "0");
            const fs = Math.min(R * 1.2 / Math.max(name.length, 1), 16);
            t.setAttribute("font-size", String(fs));
            t.textContent = name;
            svgT.appendChild(t);
          }
        }
      }
    }

    // ── イベント ─────────────────────────────────────────────────
    function getQueryParams() {
      const p = {};
      location.search.replace(/[?&]+([^=&]+)=([^&]*)/gi, (s,k,v) => {
        p[decodeURIComponent(k)] = decodeURIComponent(v.replace(/\+/g," "));
      });
      return p;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      try { await loadFont(); } catch(e) { console.warn("Font load failed:", e); }
      const p = getQueryParams();
      if (p.dept) document.getElementById("deptInput").value = p.dept;
      if (p.name) document.getElementById("nameInput").value = p.name;
      document.getElementById("currentDate").textContent = getCurrentDateFormatted();
      updateStamp();
    });

    // ── サイズ指定ヘルパー ──────────────────────────────────────────
    function getDownloadSize() {
      const val  = parseFloat(document.getElementById("sizeValue").value) || 30;
      const unit = document.getElementById("sizeUnit").value;
      const dpi  = parseFloat(document.getElementById("dpiValue").value) || 350;
      if (unit === "mm") {
        const px = Math.round(val / 25.4 * dpi);
        return { px, mm: val, dpi, unit };
      } else {
        return { px: Math.round(val), mm: null, dpi, unit };
      }
    }

    function updateSizePreview() {
      const s = getDownloadSize();
      const el = document.getElementById("sizePreview");
      if (s.unit === "mm") {
        el.textContent = `→ ${s.px} × ${s.px} px`;
      } else {
        const mm = (s.px * 25.4 / (parseFloat(document.getElementById("dpiValue").value) || 96)).toFixed(1);
        el.textContent = `→ ${mm} × ${mm} mm @${document.getElementById("dpiValue").value}dpi`;
      }
    }

    function onUnitChange() {
      const unit = document.getElementById("sizeUnit").value;
      const dpiGroup = document.getElementById("dpiGroup");
      const dpiHint = document.getElementById("dpiHint");
      const sizeInput = document.getElementById("sizeValue");
      if (unit === "mm") {
        dpiGroup.style.display = "";
        dpiHint.style.display = "";
        sizeInput.value = "15";
      } else {
        dpiGroup.style.display = "none";
        dpiHint.style.display = "none";
        sizeInput.value = "600";
      }
      updateSizePreview();
    }

    // サイズ変更時にプレビュー更新
    document.addEventListener("DOMContentLoaded", () => {
      ["sizeValue","dpiValue"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener("input", () => { updateSizePreview(); });
      });
      document.getElementById("sizeUnit").addEventListener("change", () => { updateSizePreview(); });
      document.getElementById("emfRenderMode").addEventListener("change", () => { updateStamp(); });
      setTimeout(updateSizePreview, 100);
    });

    function onUpdateButton() {
      const dept = document.getElementById("deptInput").value;
      const name = document.getElementById("nameInput").value;
      const params = new URLSearchParams();
      if (dept) params.set("dept", dept);
      if (name) params.set("name", name);
      const newUrl = location.pathname + (params.toString() ? "?" + params.toString() : "");
      history.replaceState(null, "", newUrl);
      updateStamp();
    }

    // ── SVG/PNGダウンロード ───────────────────────────────────────
    function downloadSVG(svgId, typeName) {
      const name = document.getElementById("nameInput").value || "印鑑";
      const el = document.getElementById(svgId);
      if (!el) { alert("SVG要素が見つかりません。"); return; }
      const s = getDownloadSize();
      // SVGをクローンしてwidth/heightを指定サイズに変更
      const clone = el.cloneNode(true);
      if (s.unit === "mm") {
        clone.setAttribute("width",  s.mm + "mm");
        clone.setAttribute("height", s.mm + "mm");
      } else {
        clone.setAttribute("width",  s.px);
        clone.setAttribute("height", s.px);
      }
      const blob = new Blob([new XMLSerializer().serializeToString(clone)], { type:"image/svg+xml;charset=utf-8" });
      const a = Object.assign(document.createElement("a"), { href:URL.createObjectURL(blob), download:`${name}_${typeName}.svg` });
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    async function downloadPNG(svgId, typeName) {
      const name = document.getElementById("nameInput").value || "印鑑";
      const el = document.getElementById(svgId);
      if (!el) { alert("SVG要素が見つかりません。"); return; }
      const s = getDownloadSize();
      const W = s.px, H = s.px;
      // SVGにwidth/heightをpxで明示してラスタライズ
      let svgStr = new XMLSerializer().serializeToString(el);
      if (!svgStr.includes("xmlns=")) svgStr = svgStr.replace("<svg", '<svg xmlns="http://www.w3.org/2000/svg"');
      svgStr = svgStr.replace(/width="[^"]*"/, `width="${W}"`).replace(/height="[^"]*"/, `height="${H}"`);
      const canvas = Object.assign(document.createElement("canvas"), {width:W, height:H});
      const ctx = canvas.getContext("2d");
      const img = new Image();
      await new Promise((res,rej) => {
        img.onload = res; img.onerror = rej;
        img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgStr)));
      });
      ctx.drawImage(img, 0, 0, W, H);
      const a = Object.assign(document.createElement("a"), { href:canvas.toDataURL("image/png"), download:`${name}_${typeName}.png` });
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    // ── EMF出力（ベクター版 v5） ─────────────────────────────────
    // 修正: Q/q (quadratic bezier) コマンドをcubicに変換してサポート
    //       NaN座標のコマンドをスキップ
    //       MM_TEXT + 600x600px座標系

    function downloadEMF(svgId, typeName) {
      const nameVal = document.getElementById("nameInput").value || "印鑑";
      const svgEl   = document.getElementById(svgId);
      if (!svgEl) { alert("SVG要素が見つかりません。"); return; }

      const s = getDownloadSize();
      const VB = 60;
      // rclFrame (1/100mm)
      const FRAME = s.unit === "mm"
        ? Math.round(s.mm * 100)
        : Math.round(s.px * 25.4 * 100 / 96);
      const frameMM = FRAME / 100;
      // image1.emf互換: 600dpi固定, A4参照デバイス
      const REF_DEV_X = 4961, REF_DEV_Y = 7016;
      const REF_MM_X = 210, REF_MM_Y = 297;
      const DPI = REF_DEV_X / REF_MM_X * 25.4; // ≈600
      // LOGICAL = 物理サイズ(mm) × DPI / 25.4 → rclBoundsと整合
      const LOGICAL = Math.round(frameMM / 25.4 * DPI);
      const SC = LOGICAL / VB;
      const toP = v => Math.round(v * SC);

      function parseColor(s) {
        if (!s || s==="none") return null;
        s = s.trim();
        const m = s.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
        if (m) return {r:+m[1],g:+m[2],b:+m[3]};
        if (s[0]==="#") {
          const h=s.slice(1);
          if(h.length===6) return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};
          if(h.length===3) return {r:parseInt(h[0]+h[0],16),g:parseInt(h[1]+h[1],16),b:parseInt(h[2]+h[2],16)};
        }
        return {r:239,g:69,b:74};
      }
      const cref = c => ((c.b&0xff)<<16)|((c.g&0xff)<<8)|(c.r&0xff);

      const recs = [];
      function rec(itype, arr) {
        const a = arr instanceof Uint8Array ? arr : new Uint8Array(arr);
        const sz = 8 + a.length, tot = sz + ((4-sz%4)%4);
        const b = new Uint8Array(tot);
        new DataView(b.buffer).setUint32(0, itype>>>0, true);
        new DataView(b.buffer).setUint32(4, tot>>>0,   true);
        b.set(a, 8);
        recs.push(b);
      }
      function B(){
        const a=[];
        return {
          u32(v){v=v>>>0;a.push(v&0xff,(v>>8)&0xff,(v>>16)&0xff,(v>>24)&0xff);return this;},
          s32(v){return this.u32(v>>>0);},
          u16(v){v=v&0xffff;a.push(v&0xff,(v>>8)&0xff);return this;},
          get(){return new Uint8Array(a);}
        };
      }

      const T={
        SETMAPMODE:17, SETBKMODE:18, SETPOLYFILLMODE:19,
        CLOSEFIGURE:21, MOVETOEX:27,
        SELECTOBJECT:37, CREATEBRUSHINDIRECT:39, DELETEOBJECT:40,
        LINETO:54,
        BEGINPATH:59, ENDPATH:60,
        FILLPATH:62, STROKEANDFILLPATH:63, STROKEPATH:64,
        POLYBEZIERTO16:88, EXTCREATEPEN:95, EOF:14,
      };

      let nextH = 1;
      // EXTCREATEPEN (type=95): geometric pen。ペン幅がワールド変換でスケーリングされる。
      // libemf2svg/Inkscape は CREATEPEN(38) の幅を無視するため、EXTCREATEPEN を使う。
      const createPen=(c,wpx,nullPen=false)=>{
        const h=nextH++;
        const recSize = 56; // 8(header) + 48(payload)
        const penStyle = nullPen ? 0x00010005 : 0x00010000; // PS_GEOMETRIC | (PS_NULL or PS_SOLID)
        rec(T.EXTCREATEPEN,
          B().u32(h)                    // ihPen
             .u32(recSize)              // offBmi (pointing past record = no bitmap)
             .u32(0)                    // cbBmi
             .u32(recSize)              // offBits
             .u32(0)                    // cbBits
             .u32(penStyle)             // elpPenStyle: PS_GEOMETRIC | PS_SOLID (or PS_NULL)
             .u32(nullPen ? 0 : wpx)   // elpWidth
             .u32(0)                    // elpBrushStyle: BS_SOLID
             .u32(c && !nullPen ? cref(c) : 0) // elpColor
             .u32(0)                    // elpHatch
             .u32(0)                    // elpNumEntries
             .u32(0)                    // padding (elpStyleEntry[0])
             .get());
        return h;
      };
      const createBrush=(c,nil=false)=>{
        const h=nextH++;
        rec(T.CREATEBRUSHINDIRECT, B().u32(h).u32(nil?1:0).u32(c&&!nil?cref(c):0).u32(0).get());
        return h;
      };
      const sel=h=>rec(T.SELECTOBJECT, B().u32(h).get());
      const del=h=>rec(T.DELETEOBJECT,  B().u32(h).get());

      function bezTo(cx,cy,p1,p2,p3){
        const ax=[cx,p1[0],p2[0],p3[0]], ay=[cy,p1[1],p2[1],p3[1]];
        rec(T.POLYBEZIERTO16,
          B().s32(Math.min(...ax)).s32(Math.min(...ay)).s32(Math.max(...ax)).s32(Math.max(...ay))
             .u32(3).u16(p1[0]&0xffff).u16(p1[1]&0xffff)
                   .u16(p2[0]&0xffff).u16(p2[1]&0xffff)
                   .u16(p3[0]&0xffff).u16(p3[1]&0xffff).get());
      }

      function emitCircle(cx,cy,r){
        const k=0.5523;
        const P=[[toP(cx+r),toP(cy)],
          [toP(cx+r),toP(cy+r*k)],[toP(cx+r*k),toP(cy+r)],[toP(cx),toP(cy+r)],
          [toP(cx-r*k),toP(cy+r)],[toP(cx-r),toP(cy+r*k)],[toP(cx-r),toP(cy)],
          [toP(cx-r),toP(cy-r*k)],[toP(cx-r*k),toP(cy-r)],[toP(cx),toP(cy-r)],
          [toP(cx+r*k),toP(cy-r)],[toP(cx+r),toP(cy-r*k)],[toP(cx+r),toP(cy)]];
        rec(T.BEGINPATH,[]);
        rec(T.MOVETOEX, B().s32(P[0][0]).s32(P[0][1]).s32(0).s32(0).get());
        let cx2=P[0][0],cy2=P[0][1];
        for(let s=0;s<4;s++){
          bezTo(cx2,cy2,P[1+s*3],P[2+s*3],P[3+s*3]);
          cx2=P[3+s*3][0]; cy2=P[3+s*3][1];
        }
        rec(T.CLOSEFIGURE,[]); rec(T.ENDPATH,[]);
      }

      function emitLine(x1,y1,x2,y2){
        rec(T.BEGINPATH,[]);
        rec(T.MOVETOEX, B().s32(toP(x1)).s32(toP(y1)).s32(0).s32(0).get());
        rec(T.LINETO,   B().s32(toP(x2)).s32(toP(y2)).get());
        rec(T.ENDPATH,[]);
      }

      // opentype.js の commands 配列を直接 EMF に変換
      // d文字列の再パース（NaN問題）を回避するため commands を直接使う
      // Q(二次ベジェ) → C(三次ベジェ)変換込み
      //
      // ★重要: opentype.jsの getPath() は Z コマンドを発行しないため、
      // 新しい M（contour開始）の前と、ENDPATH 前に CLOSEFIGURE を自動発行する。
      // これがないと Word/Excel はパスを閉じられず描画しない。
      function emitPathCommands(cmds){
        rec(T.BEGINPATH,[]);
        let cx=0, cy=0;
        let inFigure = false;  // 現在 figure 内か（Mが発行された後）
        cmds.forEach(c => {
          if (c.type==='M'){
            if(!isFinite(c.x)||!isFinite(c.y)) return;
            // 新しい contour 開始前に前の figure を閉じる
            if (inFigure) rec(T.CLOSEFIGURE,[]);
            cx=c.x; cy=c.y;
            rec(T.MOVETOEX, B().s32(toP(cx)).s32(toP(cy)).s32(0).s32(0).get());
            inFigure = true;
          } else if(c.type==='L'){
            if(!isFinite(c.x)||!isFinite(c.y)) return;
            cx=c.x; cy=c.y;
            rec(T.LINETO, B().s32(toP(cx)).s32(toP(cy)).get());
          } else if(c.type==='C'){
            if(!isFinite(c.x1)||!isFinite(c.y1)||!isFinite(c.x2)||!isFinite(c.y2)||!isFinite(c.x)||!isFinite(c.y)) return;
            bezTo(toP(cx),toP(cy),[toP(c.x1),toP(c.y1)],[toP(c.x2),toP(c.y2)],[toP(c.x),toP(c.y)]);
            cx=c.x; cy=c.y;
          } else if(c.type==='Q'){
            // Quadratic(Q) → Cubic(C): de Casteljau
            // cp1 = P0 + 2/3*(P1-P0),  cp2 = P2 + 2/3*(P1-P2)
            if(!isFinite(c.x1)||!isFinite(c.y1)||!isFinite(c.x)||!isFinite(c.y)) return;
            const c1x=cx   + 2/3*(c.x1-cx),  c1y=cy   + 2/3*(c.y1-cy);
            const c2x=c.x  + 2/3*(c.x1-c.x), c2y=c.y  + 2/3*(c.y1-c.y);
            bezTo(toP(cx),toP(cy),[toP(c1x),toP(c1y)],[toP(c2x),toP(c2y)],[toP(c.x),toP(c.y)]);
            cx=c.x; cy=c.y;
          } else if(c.type==='Z'){
            rec(T.CLOSEFIGURE,[]);
            inFigure = false;
          }
        });
        // 最後の figure を閉じる
        if (inFigure) rec(T.CLOSEFIGURE,[]);
        rec(T.ENDPATH,[]);
      }

      // d文字列をパースしてopentype commands形式に変換 → emitPathCommands
      // Q/q(二次ベジェ)はそのままcommands配列に残す（emitPathCommandsで変換）
      function emitDString(d){
        const toks = d.match(/[MLCQZmlcqz]|NaN|[-+]?[0-9]*\.?[0-9]+(?:[eE][-+]?[0-9]+)?/g) || [];
        let i=0, cx=0, cy=0;
        const cmds=[];
        while(i < toks.length){
          const tok=toks[i];
          if(!/^[MLCQZmlcqz]$/.test(tok)){i++;continue;} // 先頭がコマンド文字でなければスキップ
          const cmd=tok; i++;
          const num=(n=1)=>{
            const vals=[];
            for(let k=0;k<n;k++){
              const v=toks[i++];
              vals.push(v==='NaN'?NaN:parseFloat(v));
            }
            return n===1?vals[0]:vals;
          };
          if(cmd==='M'||cmd==='m'){
            const [x,y]=num(2);
            if(!isFinite(x)||!isFinite(y))continue;
            cx=cmd==='M'?x:cx+x; cy=cmd==='M'?y:cy+y;
            cmds.push({type:'M',x:cx,y:cy});
          } else if(cmd==='L'||cmd==='l'){
            const [x,y]=num(2);
            if(!isFinite(x)||!isFinite(y))continue;
            cx=cmd==='L'?x:cx+x; cy=cmd==='L'?y:cy+y;
            cmds.push({type:'L',x:cx,y:cy});
          } else if(cmd==='C'||cmd==='c'){
            const [x1,y1,x2,y2,x,y]=num(6);
            if(!isFinite(x1)||!isFinite(y1)||!isFinite(x2)||!isFinite(y2)||!isFinite(x)||!isFinite(y))continue;
            const rel=cmd==='c';
            cmds.push({type:'C',x1:rel?cx+x1:x1,y1:rel?cy+y1:y1,x2:rel?cx+x2:x2,y2:rel?cy+y2:y2,x:rel?cx+x:x,y:rel?cy+y:y});
            cx=rel?cx+x:x; cy=rel?cy+y:y;
          } else if(cmd==='Q'||cmd==='q'){
            const [x1,y1,x,y]=num(4);
            if(!isFinite(x1)||!isFinite(y1)||!isFinite(x)||!isFinite(y))continue;
            const rel=cmd==='q';
            cmds.push({type:'Q',x1:rel?cx+x1:x1,y1:rel?cy+y1:y1,x:rel?cx+x:x,y:rel?cy+y:y});
            cx=rel?cx+x:x; cy=rel?cy+y:y;
          } else if(cmd==='Z'||cmd==='z'){
            cmds.push({type:'Z'});
          }
        }
        emitPathCommands(cmds);
      }

      const renderMode = document.getElementById("emfRenderMode").value;

      // フォントモード用の追加タイプ
      const T3 = { EXTCREATEFONTINDIRECTW:82, SETTEXTCOLOR:24, SETTEXTALIGN:22, EXTTEXTOUTW:84 };

      // UTF-16LEエンコード
      function toUTF16LE(str) {
        const buf = [];
        for (let i = 0; i < str.length; i++) {
          const code = str.charCodeAt(i);
          buf.push(code & 0xff, (code >> 8) & 0xff);
        }
        return buf;
      }

      // フォント作成 (EXTCREATEFONTINDIRECTW)
      function createFont(handle, heightHimetric, color) {
        // LOGFONTW (92 bytes)
        const faceName = "Yuji Syuku";
        const faceUTF16 = toUTF16LE(faceName);
        const faceBytes = new Uint8Array(64); // WCHAR[32]
        faceBytes.set(faceUTF16);
        const lf = B()
          .s32(-Math.abs(heightHimetric))  // lfHeight (negative = character height)
          .s32(0)                          // lfWidth
          .s32(0).s32(0)                   // lfEscapement, lfOrientation
          .s32(400);                       // lfWeight (normal)
        // 8 bytes of BYTE fields
        const lfBytes = [...lf.get(),
          0, 0, 0, 128, // italic=0, underline=0, strikeout=0, charset=128(SHIFTJIS)
          0, 0, 2, 0,   // outPrec=0, clipPrec=0, quality=2(PROOF), pitchFamily=0
          ...faceBytes
        ];
        const payload = B().u32(handle);
        const fullPayload = [...payload.get(), ...lfBytes];
        rec(T3.EXTCREATEFONTINDIRECTW, new Uint8Array(fullPayload));

        // テキスト色・配置
        rec(T3.SETTEXTCOLOR, B().u32(color ? cref(color) : 0).get());
        rec(T3.SETTEXTALIGN, B().u32(0 | 24).get()); // TA_LEFT | TA_BASELINE
        return handle;
      }

      // テキスト描画 (EXTTEXTOUTW)
      function emitText(text, x, y) {
        const strUTF16 = toUTF16LE(text);
        const nChars = text.length;
        const strBytes = strUTF16.length;
        const offString = 76; // 固定オフセット(record header含む)
        const totalStr = strBytes + ((4 - strBytes % 4) % 4); // 4byte align

        const payload = B()
          .s32(0).s32(0).s32(LOGICAL).s32(LOGICAL) // Bounds
          .u32(1)                                    // iGraphicsMode (GM_COMPATIBLE)
          .u32(0x3F800000).u32(0x3F800000)           // exScale=1.0f, eyScale=1.0f
          .s32(x).s32(y)                             // ptlReference
          .u32(nChars)                               // nChars
          .u32(offString)                            // offString
          .u32(0)                                    // fOptions
          .s32(0).s32(0).s32(0).s32(0)               // rcl (no clip)
          .u32(0);                                   // offDx (no spacing)
        const payloadArr = [...payload.get(), ...strUTF16];
        // 4-byte padding
        while (payloadArr.length % 4 !== 0) payloadArr.push(0);
        rec(T3.EXTTEXTOUTW, new Uint8Array(payloadArr));
      }

      function processEl(el){
        const tag=el.tagName.toLowerCase();
        const elId = el.getAttribute("id") || "";
        const isTextPath = elId.endsWith("Path"); // deptPath, datePath, namePath, tateNamePath

        // フォントモードではテキストパスをスキップ（後で別途描画）
        if (renderMode === "font" && tag === "path" && isTextPath) return;

        const fa=el.getAttribute("fill")||"none";
        const sa=el.getAttribute("stroke")||"none";
        const sw=parseFloat(el.getAttribute("stroke-width")||"0");
        const fc=fa!=="none"?parseColor(fa):null;
        const sc=sa!=="none"?parseColor(sa):null;
        const penH = sc ? createPen(sc, Math.max(1,toP(sw))) : createPen(null,0,true);
        const brH  = fc ? createBrush(fc) : createBrush(null,true);
        sel(penH); sel(brH);
        if(tag==="circle"){
          emitCircle(parseFloat(el.getAttribute("cx")||0),parseFloat(el.getAttribute("cy")||0),parseFloat(el.getAttribute("r")||0));
        } else if(tag==="line"){
          emitLine(parseFloat(el.getAttribute("x1")||0),parseFloat(el.getAttribute("y1")||0),
                   parseFloat(el.getAttribute("x2")||0),parseFloat(el.getAttribute("y2")||0));
        } else if(tag==="path"){
          const d=el.getAttribute("d");
          if(d) emitDString(d);
        } else { del(penH); del(brH); return; }
        // rclBounds (RECTL) はMS-EMF仕様で必須 (size=24, not 8)
        const pathBounds = B().s32(0).s32(0).s32(LOGICAL).s32(LOGICAL).get();
        if(fc&&sc) rec(T.STROKEANDFILLPATH, pathBounds);
        else if(sc) rec(T.STROKEPATH, pathBounds);
        else if(fc) rec(T.FILLPATH, pathBounds);
        del(penH); del(brH);
      }

      // EMRタイプ定数を拡張
      const T2 = {
        SETWINDOWEXTEX:9, SETWINDOWORGEX:10,
        SETVIEWPORTEXTEX:11, SETVIEWPORTORGEX:12,
      };

      // === 初期設定レコード ===
      // MM_TEXT: 論理単位=デバイス単位(1:1)
      // szlDevice/szlMillimetersでDPIを動的設定し、rclBoundsとrclFrameを整合させる
      rec(T.SETMAPMODE,         B().u32(1).get());                       // MM_TEXT
      rec(T2.SETWINDOWEXTEX,    B().s32(LOGICAL).s32(LOGICAL).get());
      rec(T2.SETWINDOWORGEX,    B().s32(0).s32(0).get());
      rec(T2.SETVIEWPORTEXTEX,  B().s32(LOGICAL).s32(LOGICAL).get());    // 1:1マッピング
      rec(T2.SETVIEWPORTORGEX,  B().s32(0).s32(0).get());
      rec(T.SETBKMODE,          B().u32(1).get());                       // TRANSPARENT
      rec(T.SETPOLYFILLMODE,    B().u32(2).get());                       // WINDING

      for(const ch of svgEl.children) processEl(ch);

      // フォント参照モード: テキストをフォントで描画
      if (renderMode === "font") {
        const dept = document.getElementById("deptInput").value;
        const date = document.getElementById("currentDate").textContent;
        const name = document.getElementById("nameInput").value;

        // テキスト色を最初のpath要素のfillから取得
        let textColor = {r:239, g:69, b:74};
        const firstPath = svgEl.querySelector("path[fill]");
        if (firstPath) textColor = parseColor(firstPath.getAttribute("fill")) || textColor;

        const isSanmon = svgId === "InkanSanmon";

        if (isSanmon) {
          const R = 28 - 0.8;
          function chordHW2(cy) { return Math.sqrt(Math.max(0, R*R - (cy-30)**2)) * 0.97; }
          // 文字幅推定: CJK=1.0em, ASCII=0.55em
          function estimateWidth(text, fs) {
            let w = 0;
            for (const ch of text) w += ch.charCodeAt(0) > 0x7F ? fs : fs * 0.55;
            return w;
          }
          const zones = [
            { text: dept, cy:12.5, yMin:3.5,  yMax:21.5, hR:0.5, wR:1.2 },
            { text: date, cy:30,   yMin:22.5, yMax:37.5, hR:0.85, wR:1.5 },
            { text: name, cy:47.5, yMin:38.5, yMax:56.5, hR:0.6, wR:1.2 },
          ];
          zones.forEach(z => {
            if (!z.text) return;
            const zH = z.yMax - z.yMin;
            const zW = chordHW2(z.cy) * 2;
            const fontSize = Math.min(zH * z.hR, zW / z.text.length * z.wR);
            // テキスト幅を推定して左寄せ開始位置を計算
            const estW = estimateWidth(z.text, fontSize);
            const startX = 30 - estW / 2;
            const fontH = createFont(nextH++, toP(fontSize), textColor);
            sel(fontH);
            emitText(z.text, toP(startX), toP((z.yMin + z.yMax) / 2 + fontSize * 0.35));
            del(fontH);
          });
        } else {
          // 縦書き印: 名前を縦書きで描画
          if (name) {
            // 1文字ずつ縦に配置
            const n = name.length;
            const fontSize = Math.min(50 / Math.max(n, 1), 20);
            const startY = 30 - (n - 1) * fontSize * 0.55;
            for (let i = 0; i < n; i++) {
              const fontH = createFont(nextH++, toP(fontSize), textColor);
              sel(fontH);
              emitText(name[i], toP(30), toP(startY + i * fontSize * 1.1));
              del(fontH);
            }
          }
        }
      }

      rec(T.EOF, B().u32(0).u32(16).u32(0).get());
      const lr=recs[recs.length-1];
      new DataView(lr.buffer).setUint32(lr.byteLength-4, lr.byteLength, true);

      let bodySize=0; for(const r of recs) bodySize+=r.byteLength;
      const grand=108+bodySize, nRec=recs.length+1;

      const hdr=new Uint8Array(108); const dv=new DataView(hdr.buffer); let o=0;
      const H32=v=>{dv.setUint32(o,v>>>0,true);o+=4;};
      const S32=v=>{dv.setInt32(o,v,true);o+=4;};
      const H16=v=>{dv.setUint16(o,v&0xffff,true);o+=2;};
      H32(1);H32(108);
      S32(0);S32(0);S32(LOGICAL);S32(LOGICAL);              // rclBounds (= logical = device units)
      S32(0);S32(0);S32(FRAME);S32(FRAME);                  // rclFrame (1/100mm)
      H32(0x464D4520);H32(0x00010000);
      H32(grand);H32(nRec);
      H16(nextH);H16(0);
      H32(0);H32(0);H32(0);    // nDesc=0, offDesc=0, nPalEntries=0
      // 600dpi固定 (image1.emf互換): rclBounds/600*25.4 ≈ frameMM
      H32(REF_DEV_X);H32(REF_DEV_Y);                        // szlDevice (4961x7016)
      H32(REF_MM_X);H32(REF_MM_Y);                          // szlMillimeters (A4)
      H32(0);H32(0);H32(0);                                 // cbPixelFormat, offPixelFormat, bOpenGL
      H32(REF_MM_X * 1000);H32(REF_MM_Y * 1000);            // szlMicrometers

      const out=new Uint8Array(grand); out.set(hdr,0); let off=108;
      for(const r of recs){out.set(r,off);off+=r.byteLength;}

      const blob=new Blob([out],{type:"image/x-emf"});
      const url=URL.createObjectURL(blob);
      const a=Object.assign(document.createElement("a"),{href:url,download:`${nameVal}_${typeName}.emf`});
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ── PDF出力（ベクター版）───────────────────────────────────────
    // SVGの各要素をPDFパスオペレータに変換してベクターPDFを生成する。
    // 外部ライブラリ不要、バイナリを直接構築。

    function downloadPDF(svgId, typeName) {
      const nameVal = document.getElementById("nameInput").value || "印鑑";
      const svgEl = document.getElementById(svgId);
      if (!svgEl) { alert("SVG要素が見つかりません。"); return; }

      const s = getDownloadSize();
      const VB = 60;
      // ページサイズ (pt, 1pt = 1/72 inch)
      const pagePt = s.unit === "mm"
        ? s.mm * 72 / 25.4
        : s.px * 72 / 96;
      const SC = pagePt / VB;

      // SVG座標 → PDF座標 (y軸反転: pdf_y = pagePt - svg_y * SC)
      const tx = v => (v * SC).toFixed(3);
      const ty = v => (pagePt - v * SC).toFixed(3);
      const f3 = v => v.toFixed(3);

      function parseColor(str) {
        if (!str || str === "none") return null;
        str = str.trim();
        const m = str.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
        if (m) return [+m[1]/255, +m[2]/255, +m[3]/255];
        if (str[0] === "#") {
          const h = str.slice(1);
          if (h.length===6) return [parseInt(h.slice(0,2),16)/255, parseInt(h.slice(2,4),16)/255, parseInt(h.slice(4,6),16)/255];
          if (h.length===3) return [parseInt(h[0]+h[0],16)/255, parseInt(h[1]+h[1],16)/255, parseInt(h[2]+h[2],16)/255];
        }
        return [0.937, 0.271, 0.290]; // fallback #EF454A
      }

      // ── SVG要素 → PDFパスストリーム ──
      const lines = []; // PDFコンテンツストリーム行

      // 円 → ベジェ4弧
      function emitCircle(cx, cy, r) {
        const k = 0.5523;
        const P = [
          [cx+r, cy],
          [cx+r, cy+r*k], [cx+r*k, cy+r], [cx, cy+r],
          [cx-r*k, cy+r], [cx-r, cy+r*k], [cx-r, cy],
          [cx-r, cy-r*k], [cx-r*k, cy-r], [cx, cy-r],
          [cx+r*k, cy-r], [cx+r, cy-r*k], [cx+r, cy],
        ];
        lines.push(`${tx(P[0][0])} ${ty(P[0][1])} m`);
        for (let s=0; s<4; s++) {
          const p1=P[1+s*3], p2=P[2+s*3], p3=P[3+s*3];
          lines.push(`${tx(p1[0])} ${ty(p1[1])} ${tx(p2[0])} ${ty(p2[1])} ${tx(p3[0])} ${ty(p3[1])} c`);
        }
        lines.push("h");
      }

      // 直線
      function emitLine(x1,y1,x2,y2) {
        lines.push(`${tx(x1)} ${ty(y1)} m`);
        lines.push(`${tx(x2)} ${ty(y2)} l`);
      }

      // SVGパスd文字列 → PDFパスオペレータ
      // Q(二次ベジェ)→C(三次ベジェ)変換込み
      function emitDString(d) {
        const toks = d.match(/[MLCQZmlcqz]|NaN|[-+]?[0-9]*\.?[0-9]+(?:[eE][-+]?[0-9]+)?/g) || [];
        let i=0, cx=0, cy=0, inFigure=false;
        while (i < toks.length) {
          const tok = toks[i];
          if (!/^[MLCQZmlcqz]$/.test(tok)) { i++; continue; }
          const cmd = tok; i++;
          const num = (n) => {
            const vs = [];
            for (let k=0; k<n; k++) { const v=toks[i++]; vs.push(v==="NaN"?NaN:parseFloat(v)); }
            return n===1 ? vs[0] : vs;
          };

          if (cmd==="M"||cmd==="m") {
            const [x,y] = num(2);
            if (!isFinite(x)||!isFinite(y)) continue;
            if (inFigure) lines.push("h"); // 前のサブパスを閉じる
            cx=cmd==="M"?x:cx+x; cy=cmd==="M"?y:cy+y;
            lines.push(`${tx(cx)} ${ty(cy)} m`);
            inFigure = true;
          } else if (cmd==="L"||cmd==="l") {
            const [x,y] = num(2);
            if (!isFinite(x)||!isFinite(y)) continue;
            cx=cmd==="L"?x:cx+x; cy=cmd==="L"?y:cy+y;
            lines.push(`${tx(cx)} ${ty(cy)} l`);
          } else if (cmd==="C"||cmd==="c") {
            const [x1,y1,x2,y2,x,y] = num(6);
            if ([x1,y1,x2,y2,x,y].some(v=>!isFinite(v))) continue;
            const rel=cmd==="c";
            const ax1=rel?cx+x1:x1, ay1=rel?cy+y1:y1;
            const ax2=rel?cx+x2:x2, ay2=rel?cy+y2:y2;
            const ax=rel?cx+x:x, ay=rel?cy+y:y;
            lines.push(`${tx(ax1)} ${ty(ay1)} ${tx(ax2)} ${ty(ay2)} ${tx(ax)} ${ty(ay)} c`);
            cx=ax; cy=ay;
          } else if (cmd==="Q"||cmd==="q") {
            const [qx1,qy1,x,y] = num(4);
            if ([qx1,qy1,x,y].some(v=>!isFinite(v))) continue;
            const rel=cmd==="q";
            const ax1=rel?cx+qx1:qx1, ay1=rel?cy+qy1:qy1;
            const ax=rel?cx+x:x, ay=rel?cy+y:y;
            // Q→C変換
            const c1x=cx+2/3*(ax1-cx), c1y=cy+2/3*(ay1-cy);
            const c2x=ax+2/3*(ax1-ax), c2y=ay+2/3*(ay1-ay);
            lines.push(`${tx(c1x)} ${ty(c1y)} ${tx(c2x)} ${ty(c2y)} ${tx(ax)} ${ty(ay)} c`);
            cx=ax; cy=ay;
          } else if (cmd==="Z"||cmd==="z") {
            lines.push("h");
            inFigure = false;
          }
        }
        if (inFigure) lines.push("h");
      }

      // 各SVG要素を処理
      function processEl(el) {
        const tag = el.tagName.toLowerCase();
        const fillA = el.getAttribute("fill") || "none";
        const strokeA = el.getAttribute("stroke") || "none";
        const sw = parseFloat(el.getAttribute("stroke-width") || "0");
        const fc = fillA !== "none" ? parseColor(fillA) : null;
        const sc = strokeA !== "none" ? parseColor(strokeA) : null;

        // グラフィックステート設定
        lines.push("q"); // save state
        if (sc) lines.push(`${f3(sc[0])} ${f3(sc[1])} ${f3(sc[2])} RG`);
        if (fc) lines.push(`${f3(fc[0])} ${f3(fc[1])} ${f3(fc[2])} rg`);
        if (sw > 0) lines.push(`${f3(sw * SC)} w`);
        lines.push("1 j 1 J"); // round line join & cap

        if (tag === "circle") {
          emitCircle(parseFloat(el.getAttribute("cx")||0), parseFloat(el.getAttribute("cy")||0), parseFloat(el.getAttribute("r")||0));
        } else if (tag === "line") {
          emitLine(parseFloat(el.getAttribute("x1")||0), parseFloat(el.getAttribute("y1")||0),
                   parseFloat(el.getAttribute("x2")||0), parseFloat(el.getAttribute("y2")||0));
        } else if (tag === "path") {
          const d = el.getAttribute("d");
          if (d) emitDString(d);
        } else if (tag === "text" && loadedFont) {
          // フォントモード: <text>をopentype.jsでアウトライン化→PDFパスで描画
          const txt = el.textContent || "";
          const fontSize = parseFloat(el.getAttribute("font-size") || "10");
          const ax = parseFloat(el.getAttribute("x") || "0");
          const ay = parseFloat(el.getAttribute("y") || "0");
          const anchor = el.getAttribute("text-anchor");
          const isVert = el.getAttribute("writing-mode") === "tb";
          if (txt) {
            const path = buildPath(loadedFont, txt, ax, ay, fontSize, isVert, 0, 1.0);
            if (anchor === "middle") {
              const bb = path.getBoundingBox();
              if (bb && isFinite(bb.x1)) {
                const dx = ax - (bb.x1 + bb.x2) / 2;
                const dy = isVert ? ay - (bb.y1 + bb.y2) / 2 : 0;
                path.commands.forEach(cmd => {
                  if (cmd.x !== undefined) cmd.x += dx;
                  if (cmd.x1 !== undefined) cmd.x1 += dx;
                  if (cmd.x2 !== undefined) cmd.x2 += dx;
                  if (isVert && cmd.y !== undefined) cmd.y += dy;
                  if (isVert && cmd.y1 !== undefined) cmd.y1 += dy;
                  if (isVert && cmd.y2 !== undefined) cmd.y2 += dy;
                });
              }
            }
            // パスコマンドをPDFオペレータに変換
            let pcx = 0, pcy = 0, inFig = false;
            path.commands.forEach(cmd => {
              if (cmd.type==="M" && isFinite(cmd.x) && isFinite(cmd.y)) {
                if (inFig) lines.push("h");
                lines.push(`${tx(cmd.x)} ${ty(cmd.y)} m`);
                pcx=cmd.x; pcy=cmd.y; inFig=true;
              } else if (cmd.type==="L" && isFinite(cmd.x) && isFinite(cmd.y)) {
                lines.push(`${tx(cmd.x)} ${ty(cmd.y)} l`);
                pcx=cmd.x; pcy=cmd.y;
              } else if (cmd.type==="C" && [cmd.x1,cmd.y1,cmd.x2,cmd.y2,cmd.x,cmd.y].every(isFinite)) {
                lines.push(`${tx(cmd.x1)} ${ty(cmd.y1)} ${tx(cmd.x2)} ${ty(cmd.y2)} ${tx(cmd.x)} ${ty(cmd.y)} c`);
                pcx=cmd.x; pcy=cmd.y;
              } else if (cmd.type==="Q" && [cmd.x1,cmd.y1,cmd.x,cmd.y].every(isFinite)) {
                const c1x=pcx+2/3*(cmd.x1-pcx), c1y=pcy+2/3*(cmd.y1-pcy);
                const c2x=cmd.x+2/3*(cmd.x1-cmd.x), c2y=cmd.y+2/3*(cmd.y1-cmd.y);
                lines.push(`${tx(c1x)} ${ty(c1y)} ${tx(c2x)} ${ty(c2y)} ${tx(cmd.x)} ${ty(cmd.y)} c`);
                pcx=cmd.x; pcy=cmd.y;
              } else if (cmd.type==="Z") { lines.push("h"); inFig=false; }
            });
            if (inFig) lines.push("h");
          }
        } else { lines.push("Q"); return; }

        // 描画オペレータ
        if (fc && sc) lines.push("B");     // fill & stroke
        else if (sc) lines.push("S");      // stroke
        else if (fc) lines.push("f");      // fill (non-zero winding)
        lines.push("Q"); // restore state
      }

      for (const ch of svgEl.children) processEl(ch);

      // ── PDF構築 ──
      const stream = lines.join("\n");
      const streamBytes = new TextEncoder().encode(stream);

      // PDFオブジェクト構築
      const objs = [];
      const objOffsets = [];
      let pdfStr = "%PDF-1.4\n";

      function addObj(content) {
        const n = objs.length + 1;
        objOffsets.push(pdfStr.length);
        const s = `${n} 0 obj\n${content}\nendobj\n`;
        pdfStr += s;
        objs.push(n);
        return n;
      }

      // 1: Catalog
      addObj("<< /Type /Catalog /Pages 2 0 R >>");
      // 2: Pages
      addObj(`<< /Type /Pages /Kids [3 0 R] /Count 1 >>`);
      // 3: Page
      addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${f3(pagePt)} ${f3(pagePt)}] /Contents 4 0 R /Resources << >> >>`);
      // 4: Content stream
      addObj(`<< /Length ${streamBytes.length} >>\nstream\n${stream}\nendstream`);

      // Xref table
      const xrefOffset = pdfStr.length;
      pdfStr += `xref\n0 ${objs.length + 1}\n`;
      pdfStr += "0000000000 65535 f \n";
      for (const off of objOffsets) {
        pdfStr += String(off).padStart(10, "0") + " 00000 n \n";
      }

      // Trailer
      pdfStr += `trailer\n<< /Size ${objs.length + 1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF\n`;

      const blob = new Blob([pdfStr], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);
      const a = Object.assign(document.createElement("a"), { href: url, download: `${nameVal}_${typeName}.pdf` });
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
